schema_version: 1

context:
  version: "2.39.0"
  posix: ${{ "m2-" if win else "" }}

package:
  name: cmdstan
  version: ${{ version }}

source:
  url: |
   {% if x86 or arm64 %}
   https://github.com/stan-dev/cmdstan/releases/download/v${{ version }}/cmdstan-${{ version }}.tar.gz
   {% else %}
   {% if aarch64 %}
   https://github.com/stan-dev/cmdstan/releases/download/v${{ version }}/cmdstan-${{ version }}-linux-arm64.tar.gz
   {% else %}
   {% if ppc64le %}
   https://github.com/stan-dev/cmdstan/releases/download/v${{ version }}/cmdstan-${{ version }}-linux-ppc64el.tar.gz
   {% endif %}
   {% endif %}
   {% endif %}

  sha256: ${{ "ffe03c29c9f139d77deeb156a2a0911ebf0742ae38311c739f4fcea3bc4f8909" if x86 or arm64 else "58f0366614120f0f7be56179bb8f89a350af05f037ab5db32f8042fc05b5a587" if aarch64 else "beccdc4e7416c1a861005d246ff71eafccac18217af6ba1cae1ff54ec7b151ca" }}

build:
  number: 0
  dynamic_linking:
    binary_relocation: false

requirements:
  build:
    - ${{ posix }}make
    - if: not win
      then:
      - ${{ compiler('cxx') }}
      - ${{ stdlib("c") }}
    - if: win
      then:
      - ${{ compiler('m2w64_cxx') }}
      - ${{ stdlib("m2w64_c") }}
      - ${{ posix }}filesystem
      - ${{ posix }}sed
      - ${{ posix }}coreutils
  host:
    - if: not win
      then: tbb-devel
  run:
    - ${{ posix }}make
    - if: not win
      then:
      - ${{ compiler('cxx') }}
      - ${{ stdlib("c") }}
      - tbb-devel
    - if: win
      then:
      - ${{ compiler('m2w64_cxx') }}
      - ${{ stdlib("m2w64_c") }}
      - ${{ posix }}filesystem
      - ${{ posix }}sed
      - ${{ posix }}coreutils
    - if: linux
      then: gxx_${{ target_platform }} >=${{ cxx_compiler_version }}

  run_constraints:
    - if: win
      then: tbb >=2021

tests:
  - downstream: cmdstanpy

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: CmdStan, the command line interface to Stan
  description: |
    <b>CmdStan</b> is the command line interface to Stan, a package providing

    * full Bayesian inference using the No-U-Turn sampler (NUTS), a variant of Hamiltonian Monte Carlo (HMC),
    * penalized maximum likelihood estimation (MLE) using optimization, either Newton or quasi-Newton algorithms BFGS and L-BFGS,
    * approximate Bayesian inference using automatic differentiation variational inference (ADVI),
    * a full first- and higher-order automatic differentiation library based on C++ template overloads, and
    * a supporting fully-templated matrix, linear algebra, and probability special function library.
  homepage: https://mc-stan.org/users/interfaces/cmdstan.html
  repository: https://github.com/stan-dev/cmdstan
  documentation: https://mc-stan.org/docs/cmdstan-guide/index.html

extra:
  recipe-maintainers:
    - maresb
    - WardBrian
